version: '3.1'
services:
  db:
    image: postgres:16-alpine
    container_name: database
    environment:
      POSTGRES_USER: goku
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: animes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: